<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel投票</title>

<style>
body {
    font-family: sans-serif;
    background: #eef2f7;
    text-align: center;
    margin: 0;
    padding: 10px;
}
.container { max-width: 400px; margin: auto; }
h1 { font-size: 24px; margin-bottom: 10px; }
.sub { color: gray; font-size: 14px; }
.url { font-weight: bold; margin: 15px 0; word-break: break-all; }

.buttons { display: flex; gap: 10px; margin: 15px 0; }

button {
    flex: 1;
    padding: 14px;
    font-size: 16px;
    border-radius: 12px;
    border: none;
    color: white;
}

.onsen { background: #5b8bd0; }
.food { background: #5fbf7a; }

.reset {
    background: #e25745;
    width: 100%;
    margin: 10px 0;
}

.result-box {
    background: #fff;
    border-radius: 16px;
    padding: 15px;
    margin: 10px 0;
}

.bar-bg {
    background: #ddd;
    border-radius: 10px;
    height: 12px;
    margin-top: 8px;
}

.bar {
    height: 12px;
    border-radius: 10px;
    position: relative;
}

.percent {
    position: absolute;
    right: 5px;
    top: -20px;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="container">

<h1>どっち行く？Travel投票</h1>
<p class="sub">直感でポチッと（あとから変更OK）</p>

<p>このURLを共有</p>
<p class="url" id="url"></p>

<div class="buttons">
    <button class="onsen" onclick="vote('onsen')">温泉</button>
    <button class="food" onclick="vote('food')">食べ歩き</button>
</div>

<button class="reset" onclick="resetVote()">リセット</button>

<h3>結果</h3>

<div class="result-box">
    <p>温泉（<span id="onsen">0</span>票）</p>
    <div class="bar-bg">
        <div id="onsenBar" class="bar" style="background:#5b8bd0;">
            <span id="onsenPercent" class="percent">0%</span>
        </div>
    </div>
</div>

<div class="result-box">
    <p>食べ歩き（<span id="food">0</span>票）</p>
    <div class="bar-bg">
        <div id="foodBar" class="bar" style="background:#5fbf7a;">
            <span id="foodPercent" class="percent">0%</span>
        </div>
    </div>
</div>

</div>

<script>
let onsen = localStorage.getItem("onsen") || 0;
let food = localStorage.getItem("food") || 0;

function vote(type) {
    if(type === "onsen") onsen++;
    if(type === "food") food++;
    save();
    update();
}

function resetVote() {
    onsen = 0;
    food = 0;
    save();
    update();
}

function save() {
    localStorage.setItem("onsen", onsen);
    localStorage.setItem("food", food);
}

function update() {
    document.getElementById("onsen").innerText = onsen;
    document.getElementById("food").innerText = food;

    let total = Number(onsen) + Number(food);

    let onsenPercent = total ? Math.floor(onsen * 100 / total) : 0;
    let foodPercent = total ? Math.floor(food * 100 / total) : 0;

    document.getElementById("onsenBar").style.width = onsenPercent + "%";
    document.getElementById("foodBar").style.width = foodPercent + "%";

    document.getElementById("onsenPercent").innerText = onsenPercent + "%";
    document.getElementById("foodPercent").innerText = foodPercent + "%";
}

// URL表示
document.getElementById("url").innerText = location.href;

update();
</script>

</body>
</html>
